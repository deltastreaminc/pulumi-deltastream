name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (for fork PRs requiring manual dispatch)'
        required: true

jobs:
  prerequisites:
    uses: ./.github/workflows/prerequisites.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
    with:
      is_pr: ${{ github.event_name == 'pull_request' }}
      default_branch: ${{ github.event.repository.default_branch }}

  build_sdk:
    name: build_sdk
    needs: prerequisites
    uses: ./.github/workflows/build_sdk.yml
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}

  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    needs: [prerequisites, build_sdk]
    # Only run automatically for non-fork PRs (secrets are available).
    # For fork PRs, a maintainer can trigger via workflow_dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      MISE_ENV: test
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise (with test overlay)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.6.14
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_save: false

      - name: Setup Go module cache
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          cache-dependency-path: go.sum

      - name: Download provider binary
        uses: actions/download-artifact@v4
        with:
          name: provider-bin
          path: bin/

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*
          path: sdk-download/
          merge-multiple: false

      - name: Restore executable permissions + SDK layout
        run: |
          chmod +x bin/pulumi-resource-deltastream
          mkdir -p sdk
          for lang in nodejs python dotnet go java; do
            if [ -d "sdk-download/sdk-${lang}" ]; then
              cp -r "sdk-download/sdk-${lang}" "sdk/${lang}"
            fi
          done
          mkdir -p .make && touch .make/schema .make/mise_install \
            .make/generate_nodejs .make/generate_go .make/generate_python \
            .make/generate_dotnet .make/generate_java \
            .make/build_nodejs .make/build_go .make/build_python \
            .make/build_dotnet .make/build_java

      - name: Setup credentials
        run: |
          echo "${{ secrets.CI_CREDENTIALS_YAML }}" > examples/credentials.yaml

      - name: Install SDKs and run integration tests
        # Only nodejs and go SDKs are needed for the integration tests
        # (matches the origin/main behaviour: make install_sdks test only installed nodejs+go)
        run: make install_nodejs_sdk install_go_sdk test

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: ~/go/src/**/command-output/*
          if-no-files-found: ignore
          retention-days: 5
