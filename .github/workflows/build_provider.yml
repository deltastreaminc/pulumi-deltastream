name: Build Provider

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build_provider:
    name: Build ${{ matrix.platform.os }}-${{ matrix.platform.arch }}
    runs-on: ubuntu-latest
    env:
      PROVIDER_VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { os: linux,  arch: amd64 }
          - { os: linux,  arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.6.14
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_save: false

      - name: Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}-

      - name: Download schema (for sentinel)
        uses: actions/download-artifact@v4
        with:
          name: schema.json
          path: provider/cmd/pulumi-resource-deltastream/

      - name: Restore make sentinels
        run: |
          mkdir -p .make provider/cmd/pulumi-resource-deltastream
          touch .make/schema .make/mise_install

      - name: Cross-compile provider binary
        run: make provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}

      - name: Package provider tarball
        run: make provider_dist-${{ matrix.platform.os }}-${{ matrix.platform.arch }}

      - name: Upload provider tarball
        uses: actions/upload-artifact@v4
        with:
          name: pulumi-resource-deltastream-v${{ inputs.version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz
          path: bin/pulumi-resource-deltastream-v${{ inputs.version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz
          retention-days: 7
