name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      # Prerelease tags (e.g. v1.0.0-rc.1) also trigger the pipeline;
      # publish.yml receives isPrerelease=true for tags containing '-' and
      # creates a draft GitHub Release rather than a public one.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3 — no leading v)'
        required: true
      isPrerelease:
        description: 'Mark as prerelease/draft'
        required: false
        type: boolean
        default: false

jobs:
  prerequisites:
    uses: ./.github/workflows/prerequisites.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
    with:
      is_pr: false
      default_branch: ${{ github.event.repository.default_branch }}

  build_provider:
    needs: prerequisites
    uses: ./.github/workflows/build_provider.yml
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}

  build_sdk:
    needs: prerequisites
    uses: ./.github/workflows/build_sdk.yml
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}

  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    needs: [prerequisites, build_provider, build_sdk]
    runs-on: ubuntu-latest
    env:
      MISE_ENV: test
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise (with test overlay)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.6.14
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_save: false

      - name: Setup Go module cache
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          cache-dependency-path: go.sum

      - name: Download linux-amd64 provider binary
        uses: actions/download-artifact@v4
        with:
          name: pulumi-resource-deltastream-v${{ needs.prerequisites.outputs.version }}-linux-amd64.tar.gz
          path: dist/

      - name: Extract provider binary for tests
        run: |
          mkdir -p bin
          tar -xzf dist/pulumi-resource-deltastream-v${{ needs.prerequisites.outputs.version }}-linux-amd64.tar.gz \
            -C bin/ pulumi-resource-deltastream
          chmod +x bin/pulumi-resource-deltastream

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*
          path: sdk-download/
          merge-multiple: false

      - name: Restore SDK layout and sentinels
        run: |
          mkdir -p sdk
          for lang in nodejs python dotnet go java; do
            if [ -d "sdk-download/sdk-${lang}" ]; then
              cp -r "sdk-download/sdk-${lang}" "sdk/${lang}"
            fi
          done
          mkdir -p .make && touch .make/schema .make/mise_install \
            .make/generate_nodejs .make/generate_go .make/generate_python \
            .make/generate_dotnet .make/generate_java \
            .make/build_nodejs .make/build_go .make/build_python \
            .make/build_dotnet .make/build_java

      - name: Setup credentials
        run: echo "${{ secrets.CI_CREDENTIALS_YAML }}" > examples/credentials.yaml

      - name: Install SDKs and run integration tests
        # Only nodejs and go SDKs are needed for the integration tests
        run: make install_nodejs_sdk install_go_sdk test

  publish:
    name: publish
    needs: [prerequisites, build_provider, build_sdk, test, lint]
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write
      id-token: write  # Required for NuGet Trusted Publishing (OIDC) in publish_sdk job
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}
      isPrerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.isPrerelease == 'true' || contains(needs.prerequisites.outputs.version, '-') }}
      setLatestRelease: ${{ github.event.base_ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'push' }}
      skipGoSdk: false

  verify:
    needs: [prerequisites, publish]
    uses: ./.github/workflows/verify-release.yml
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}
