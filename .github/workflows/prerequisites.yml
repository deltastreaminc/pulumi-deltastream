name: Prerequisites

on:
  workflow_call:
    inputs:
      is_pr:
        type: boolean
        required: true
      default_branch:
        type: string
        required: true
    outputs:
      version:
        description: "Provider version being built"
        value: ${{ jobs.prerequisites.outputs.version }}

jobs:
  prerequisites:
    name: prerequisites
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      version: ${{ steps.provider-version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Fetch full history so provider-version-action can compute the version from tags
          fetch-depth: 0

      - name: Calculate provider version
        id: provider-version
        uses: pulumi/provider-version-action@v2
        with:
          set-env: PROVIDER_VERSION

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.6.14
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_save: true

      - name: Setup Go module cache
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          cache-dependency-path: go.sum

      - name: Build provider binary
        run: make provider
        env:
          PROVIDER_VERSION: ${{ steps.provider-version.outputs.version }}

      - name: Run provider unit tests
        run: make test_provider

      - name: Generate schema
        run: make schema
        env:
          PROVIDER_VERSION: ${{ steps.provider-version.outputs.version }}

      - name: Check schema diff on PR
        if: inputs.is_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "SCHEMA_CHANGES<<$EOF"
            LAST=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "NONE")
            if [ "$LAST" != "NONE" ]; then
              schema-tools compare \
                --provider deltastream \
                --old-commit "$LAST" \
                --repository github://api.github.com/deltastreaminc \
                --new-path provider/cmd/pulumi-resource-deltastream/schema.json || true
            else
              echo "No previous release found; skipping schema diff."
            fi
            echo "$EOF"
          } >> "$GITHUB_ENV"

      - name: Comment schema diff on PR
        if: inputs.is_pr
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-tag: schemaCheck
          message: |
            **Schema diff vs last release:**

            ${{ env.SCHEMA_CHANGES }}

      - name: Upload provider binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-bin
          path: bin/pulumi-resource-deltastream
          retention-days: 7

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema.json
          path: provider/cmd/pulumi-resource-deltastream/schema.json
          retention-days: 7
