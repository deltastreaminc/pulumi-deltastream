name: Verify Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Provider version to verify (without leading v)"
        required: true
        type: string

jobs:
  verify:
    name: verify (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [nodejs, python]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache_save: false

      - name: Verify Node.js SDK
        if: matrix.runtime == 'nodejs'
        run: |
          npm init -y >/dev/null 2>&1
          npm install @deltastream/pulumi-deltastream@${{ inputs.version }}
          node -e "require('@deltastream/pulumi-deltastream'); console.log('Node SDK ok')"

      - name: Verify Python SDK
        if: matrix.runtime == 'python'
        run: |
          pip install pulumi-deltastream==${{ inputs.version }} --quiet
          python -c "import pulumi_deltastream; print('Python SDK ok')"
