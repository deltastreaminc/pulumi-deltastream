# Tool versions for all environments: local dev, CI, and devcontainer.
# All tools are installed by mise - do not duplicate these in CI workflow setup-* actions.
# Go version is pinned here to match go.mod. Update both together.

[env]
PULUMI_HOME = "{{config_root}}/.pulumi"

[tools]
# Language runtimes
go      = "1.25.11"  # matches go.mod; avoids toolchain auto-download in CI
node    = "22.23.1"  # Node 22 LTS (Jod); @pulumi/pulumi@3.249+ requires Node >=22
python  = "3.11.15"  # 3.11.8 predates SLSA attestations (added mid-2024); 3.11.15 is latest 3.11 patch with attestations
# .NET: vfox backend used because the native dotnet backend has Windows issues
"vfox:version-fox/vfox-dotnet" = "8.0.20"
java    = "corretto-11"  # Pulumi Java SDK build.gradle requires languageVersion=11; corretto-21 causes toolchain resolution failure

# Build tools
"npm:yarn"                          = "1.22.22"
"aqua:gradle/gradle-distributions" = "8.14.3"   # 8.8 is not in aqua registry; minimum is 8.10.2

# Pulumi CLI and tooling
"github:pulumi/pulumi"        = "3.246.0"
"github:pulumi/pulumictl"     = "0.0.50"
"github:pulumi/schema-tools"  = "0.7.1"

# Linting
golangci-lint = "2.12.2"  # must be built with go >= module's go version (1.25); v1.x built with go1.24 fails

[settings]
experimental            = true   # Required for go: and github: binary backends
lockfile                = true   # Use .config/mise.lock for deterministic installs without GitHub API calls
http_retries            = 3
pin                     = true
fetch_remote_versions_cache = "24h"
# Node.js GPG signature verification fails in containers where gpg's keyring
# is not pre-populated. Downloads are still protected by SHA256 checksums.
node.gpg_verify = false

[plugins]
vfox-pulumi = "https://github.com/pulumi/vfox-pulumi"
