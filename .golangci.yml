version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - revive
    - staticcheck

  settings:
    goimports:
      local-prefixes: github.com/deltastreaminc/pulumi-deltastream
    revive:
      rules:
        - name: exported
          severity: warning

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    # Test files can use dot imports and unexported identifiers freely
    - path: _test\.go
      linters:
        - revive
  max-issues-per-linter: 50
  max-same-issues: 10
